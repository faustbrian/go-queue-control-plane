name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: read

jobs:
  quality:
    name: Release quality gates
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: control_plane_test
          POSTGRES_USER: control_plane_test
          POSTGRES_PASSWORD: control_plane_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U control_plane_test -d control_plane_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
      redis:
        image: redis:6.2.22@sha256:3b477db2f54035771360d023c9aff4c6255ba833834511b8eedc5ba8c10d0bce
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
      valkey:
        image: valkey/valkey:9.1.0@sha256:8e8d64b405ce18f41b8e5ee20aa4687a8ed0022d1298f2ce31cdcf3a76e09411
        ports:
          - 6380:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    steps:
      - name: Check out release commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: _browser/package-lock.json

      - name: Install browser test dependencies
        run: npm ci
        working-directory: _browser

      - name: Audit browser dependencies
        run: npm audit --audit-level=high
        working-directory: _browser

      - name: Install Chromium
        run: npx playwright install --with-deps chromium
        working-directory: _browser

      - name: Check browser test sources
        run: npm run check:browser
        working-directory: _browser

      - name: Run browser security tests
        run: npm run test:browser
        working-directory: _browser

      - name: Run deterministic quality gates
        run: scripts/check.sh

      - name: Run advisory NilAway analysis
        run: scripts/nilaway.sh

      - name: Run API fuzz smoke test
        env:
          FUZZ_TIME: 10s
        run: scripts/fuzz-smoke.sh

      - name: Run bounded load benchmark smoke tests
        env:
          BENCH_COUNT: 1
          GOMAXPROCS: 1
        run: scripts/benchmarks.sh

      - name: Scan reachable Go vulnerabilities
        run: scripts/security-scan.sh

      - name: Mutation-test administrative decisions
        run: scripts/mutation.sh

      - name: Check public Go API compatibility
        run: scripts/api-compatibility.sh

      - name: Run real PostgreSQL integration
        env:
          TEST_DATABASE_URL: >-
            postgres://control_plane_test:control_plane_test@127.0.0.1:5432/control_plane_test?sslmode=disable
        run: scripts/integration-postgres.sh

      - name: Run real backends through go-queue management
        env:
          TEST_REDIS_ADDRESS: 127.0.0.1:6379
          TEST_VALKEY_ADDRESS: 127.0.0.1:6380
        run: scripts/integration-queue.sh

      - name: Prove PostgreSQL backup and restore
        run: scripts/disaster-recovery-postgres.sh

  container:
    name: Sign ${{ matrix.target }} container
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: server
            package: go-queue-control-plane
          - target: cli
            package: go-queue-control
    concurrency:
      group: release-${{ github.ref }}-${{ matrix.target }}
      cancel-in-progress: false
    steps:
      - name: Check out release commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Validate tag and prepare metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              printf 'release tag is not semantic: %s\n' "${GITHUB_REF_NAME}" >&2
              exit 1
          fi
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.package }}"
          {
              printf 'image=%s\n' "${image}"
              printf 'tag=%s\n' "${GITHUB_REF_NAME}"
              printf 'version=%s\n' "${GITHUB_REF_NAME#v}"
              epoch="$(git show -s --format=%ct "${GITHUB_SHA}")"
              printf 'built_at=%s\n' "$(date -u --date="@${epoch}" +%Y-%m-%dT%H:%M:%SZ)"
          } >> "${GITHUB_OUTPUT}"

      - name: Configure Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Build and push attested image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.image }}:${{ steps.metadata.outputs.tag }}
          sbom: true
          provenance: mode=max
          build-args: |
            VERSION=${{ steps.metadata.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILT_AT=${{ steps.metadata.outputs.built_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image digest with GitHub OIDC
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ steps.metadata.outputs.image }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Verify release workflow identity
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IDENTITY: >-
            https://github.com/${{ github.repository }}/.github/workflows/release.yml@${{ github.ref }}
          IMAGE: ${{ steps.metadata.outputs.image }}
        run: >-
          cosign verify "${IMAGE}@${DIGEST}"
          --certificate-identity "${IDENTITY}"
          --certificate-oidc-issuer https://token.actions.githubusercontent.com

  artifacts:
    name: Sign standalone release archives
    needs: [quality, container]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    concurrency:
      group: release-${{ github.ref }}-artifacts
      cancel-in-progress: false
    steps:
      - name: Check out release commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Validate tag and prepare reproducible metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              printf 'release tag is not semantic: %s\n' "${GITHUB_REF_NAME}" >&2
              exit 1
          fi
          epoch="$(git show -s --format=%ct "${GITHUB_SHA}")"
          {
              printf 'version=%s\n' "${GITHUB_REF_NAME#v}"
              printf 'epoch=%s\n' "${epoch}"
              printf 'built_at=%s\n' "$(date -u --date="@${epoch}" +%Y-%m-%dT%H:%M:%SZ)"
          } >> "${GITHUB_OUTPUT}"

      - name: Build reproducible standalone archives
        env:
          BUILT_AT: ${{ steps.metadata.outputs.built_at }}
          COMMIT: ${{ github.sha }}
          SOURCE_DATE_EPOCH: ${{ steps.metadata.outputs.epoch }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: scripts/build-release-archives.sh

      - name: Sign archive checksums with GitHub OIDC
        run: >-
          cosign sign-blob --yes
          --bundle dist/SHA256SUMS.bundle
          dist/SHA256SUMS

      - name: Verify archive signing identity
        env:
          IDENTITY: >-
            https://github.com/${{ github.repository }}/.github/workflows/release.yml@${{ github.ref }}
        run: >-
          cosign verify-blob
          --bundle dist/SHA256SUMS.bundle
          --certificate-identity "${IDENTITY}"
          --certificate-oidc-issuer https://token.actions.githubusercontent.com
          dist/SHA256SUMS

      - name: Publish immutable-tag release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          options=(
              --verify-tag
              --generate-notes
              --title "${GITHUB_REF_NAME}"
          )
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
              options+=(--prerelease --latest=false)
          fi
          gh release create \
              "${GITHUB_REF_NAME}" \
              dist/* \
              "${options[@]}"
